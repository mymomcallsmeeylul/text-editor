<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg" width="500" height="700">
  <defs>
    <filter id="paperShadow" x="-6%" y="-4%" width="118%" height="114%">
      <feDropShadow dx="2" dy="6" stdDeviation="14" flood-color="#B09070" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Paper body -->
  <rect x="4" y="54" width="492" height="642" rx="3" fill="#FFFDF0" filter="url(#paperShadow)"/>

  <!-- Binding strip -->
  <rect x="0" y="0" width="500" height="58" rx="3" fill="#CDBFA6"/>
  <!-- Bridge overlap so no gap between strip and paper -->
  <rect x="0" y="50" width="500" height="14" fill="#C4B49A"/>

  <!-- Coil wire — back arc (behind holes, goes below centre) -->
  <path d="M 0,30 Q 27,50 55,30 Q 83,50 110,30 Q 138,50 165,30 Q 193,50 220,30
           Q 248,50 275,30 Q 303,50 330,30 Q 358,50 385,30 Q 413,50 440,30
           Q 468,50 495,30"
        fill="none" stroke="#888" stroke-width="4.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Binding holes -->
  <g fill="#B0A38E" stroke="#9A8E78" stroke-width="1.2">
    <ellipse cx="55"  cy="30" rx="8" ry="10.5"/>
    <ellipse cx="110" cy="30" rx="8" ry="10.5"/>
    <ellipse cx="165" cy="30" rx="8" ry="10.5"/>
    <ellipse cx="220" cy="30" rx="8" ry="10.5"/>
    <ellipse cx="275" cy="30" rx="8" ry="10.5"/>
    <ellipse cx="330" cy="30" rx="8" ry="10.5"/>
    <ellipse cx="385" cy="30" rx="8" ry="10.5"/>
    <ellipse cx="440" cy="30" rx="8" ry="10.5"/>
  </g>
  <!-- Inner hole shadow -->
  <g fill="#988070" opacity="0.5">
    <ellipse cx="55"  cy="31" rx="5" ry="7"/>
    <ellipse cx="110" cy="31" rx="5" ry="7"/>
    <ellipse cx="165" cy="31" rx="5" ry="7"/>
    <ellipse cx="220" cy="31" rx="5" ry="7"/>
    <ellipse cx="275" cy="31" rx="5" ry="7"/>
    <ellipse cx="330" cy="31" rx="5" ry="7"/>
    <ellipse cx="385" cy="31" rx="5" ry="7"/>
    <ellipse cx="440" cy="31" rx="5" ry="7"/>
  </g>

  <!-- Coil wire — front arc (in front of holes, goes above centre) -->
  <path d="M 0,30 Q 27,10 55,30 Q 83,10 110,30 Q 138,10 165,30 Q 193,10 220,30
           Q 248,10 275,30 Q 303,10 330,30 Q 358,10 385,30 Q 413,10 440,30
           Q 468,10 495,30"
        fill="none" stroke="#B8B8B8" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Red margin line -->
  <line x1="72" y1="60" x2="72" y2="696" stroke="#D4848A" stroke-width="1.5" opacity="0.65"/>

  <!-- Ruled lines — 21 lines, y=90 to y=650, step=28 -->
  <g stroke="#BACFE0" stroke-width="0.85" opacity="0.75">
    <line x1="14" y1="90"  x2="486" y2="90"/>
    <line x1="14" y1="118" x2="486" y2="118"/>
    <line x1="14" y1="146" x2="486" y2="146"/>
    <line x1="14" y1="174" x2="486" y2="174"/>
    <line x1="14" y1="202" x2="486" y2="202"/>
    <line x1="14" y1="230" x2="486" y2="230"/>
    <line x1="14" y1="258" x2="486" y2="258"/>
    <line x1="14" y1="286" x2="486" y2="286"/>
    <line x1="14" y1="314" x2="486" y2="314"/>
    <line x1="14" y1="342" x2="486" y2="342"/>
    <line x1="14" y1="370" x2="486" y2="370"/>
    <line x1="14" y1="398" x2="486" y2="398"/>
    <line x1="14" y1="426" x2="486" y2="426"/>
    <line x1="14" y1="454" x2="486" y2="454"/>
    <line x1="14" y1="482" x2="486" y2="482"/>
    <line x1="14" y1="510" x2="486" y2="510"/>
    <line x1="14" y1="538" x2="486" y2="538"/>
    <line x1="14" y1="566" x2="486" y2="566"/>
    <line x1="14" y1="594" x2="486" y2="594"/>
    <line x1="14" y1="622" x2="486" y2="622"/>
    <line x1="14" y1="650" x2="486" y2="650"/>
  </g>

  <!-- Subtle bottom-edge shadow to give page depth -->
  <rect x="4" y="686" width="492" height="10" rx="2" fill="#D8C8A8" opacity="0.3"/>
</svg>
